<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title style="font-weight: 800; font-size: 19px;">Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content style="--background: #121212;">

  <div style="text-align: center; padding: 40px 20px 20px 20px; background: linear-gradient(to bottom, var(--ion-color-primary), #121212);">
    <div style="position: relative; width: 110px; height: 110px; margin: 0 auto 15px auto;">
      <ion-avatar style="width: 100%; height: 100%; border: 4px solid #1e1e1e; box-shadow: 0 8px 20px rgba(0,0,0,0.4); background: #1e1e1e; display: flex; align-items: center; justify-content: center;">
        <ion-icon name="person" style="font-size: 65px; color: #444;"></ion-icon>
      </ion-avatar>
      <div style="position: absolute; bottom: 5px; right: 5px; background: #2dd36f; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 3px solid #1e1e1e;">
        <ion-icon name="checkmark-outline" style="color: white; font-size: 16px; font-weight: bold;"></ion-icon>
      </div>
    </div>
    <h2 style="font-weight: 850; font-size: 24px; color: white; margin: 0;">{{ usuario.name || 'Cargando...' }}</h2>
    <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600;">Ciudadano Verificado</p>
  </div>

  <div style="padding: 10px 20px;">
    <div style="background: #1e1e1e; border-radius: 25px; border: 1px solid #2a2a2a; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
      <ion-item lines="full" style="--background: transparent; --inner-padding-end: 15px; height: 80px;">
        <div slot="start" style="background: rgba(var(--ion-color-primary-rgb), 0.1); padding: 10px; border-radius: 12px; margin-right: 15px;">
          <ion-icon name="mail-outline" color="primary" style="font-size: 24px;"></ion-icon>
        </div>
        <ion-label>
          <p style="font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Correo Electrónico</p>
          <h3 style="color: white; font-weight: 600;">{{ usuario.email || '...' }}</h3>
        </ion-label>
      </ion-item>

      <ion-item lines="none" style="--background: transparent; --inner-padding-end: 15px; height: 80px;">
        <div slot="start" style="background: rgba(var(--ion-color-primary-rgb), 0.1); padding: 10px; border-radius: 12px; margin-right: 15px;">
          <ion-icon name="card-outline" color="primary" style="font-size: 24px;"></ion-icon>
        </div>
        <ion-label>
          <p style="font-size: 11px; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">CURP</p>
          <h3 style="color: white; font-weight: 600; text-transform: uppercase;">{{ usuario.curp || '...' }}</h3>
        </ion-label>
      </ion-item>
    </div>
  </div>

  <div style="padding: 25px 20px;">
    <ion-button expand="block" mode="ios" fill="clear" style="--color: #888; font-weight: bold; margin-bottom: 10px;" (click)="cambiarPassword()">
      <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
      Cambiar Contraseña
    </ion-button>

    <ion-button expand="block" mode="ios" color="danger" style="--border-radius: 16px; height: 55px; font-weight: 800; box-shadow: 0 4px 15px rgba(235, 68, 90, 0.3);" (click)="confirmarCerrarSesion()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      CERRAR SESIÓN
    </ion-button>
  </div>

  <ion-modal [isOpen]="isModalPasswordOpen" (didDismiss)="isModalPasswordOpen = false" 
             initialBreakpoint="0.65" [breakpoints]="[0, 0.65]"
             style="--border-radius: 30px 30px 0 0;">
    <ng-template>
      <div style="width: 45px; height: 5px; background: #333; border-radius: 10px; margin: 15px auto; display: block;"></div>
      
      <ion-header class="ion-no-border">
        <ion-toolbar style="--background: transparent;">
          <ion-title style="font-weight: 800; font-size: 20px; color: white;">Nueva Contraseña</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="isModalPasswordOpen = false" style="--color: #666;">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content style="--background: #121212;" class="ion-padding">
        <div style="background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #2a2a2a;">
          
          <ion-item lines="none" style="--background: #121212; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333;">
            <ion-icon name="lock-open-outline" slot="start" color="primary"></ion-icon>
            <ion-input [(ngModel)]="passData.current_password" type="password" [passwordToggle]="true" placeholder="Contraseña actual"></ion-input>
          </ion-item>

          <ion-item lines="none" style="--background: #121212; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333;">
            <ion-icon name="key-outline" slot="start" color="primary"></ion-icon>
            <ion-input [(ngModel)]="passData.password" type="password" [passwordToggle]="true" placeholder="Nueva contraseña"></ion-input>
          </ion-item>

          <ion-item lines="none" style="--background: #121212; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333;">
            <ion-icon name="shield-checkmark-outline" slot="start" color="primary"></ion-icon>
            <ion-input [(ngModel)]="passData.password_confirmation" type="password" [passwordToggle]="true" placeholder="Confirmar contraseña"></ion-input>
          </ion-item>

          <ion-button expand="block" mode="ios" (click)="guardarNuevaPassword()" style="--border-radius: 14px; height: 50px; font-weight: 800; box-shadow: 0 4px 15px rgba(var(--ion-color-primary-rgb), 0.3);">
            ACTUALIZAR AHORA
          </ion-button>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
