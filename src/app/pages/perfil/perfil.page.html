<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" color="light">

  <div class="ion-text-center ion-padding-top ion-padding-bottom">
    <ion-avatar style="width: 100px; height: 100px; margin: 0 auto; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0); background: #e0e0e0;">
      <ion-icon name="person" style="font-size: 60px; color: #999; margin-top: 15px;"></ion-icon>
    </ion-avatar>

    <h2 style="font-weight: 800; margin-bottom: 5px; color: #333;">{{ usuario.name || 'Cargando...' }}</h2>
    
    <ion-chip color="success" mode="ios">
      <ion-icon name="checkmark-circle"></ion-icon>
      <ion-label>Ciudadano Verificado</ion-label>
    </ion-chip>
  </div>

  <ion-list inset="true" lines="full">
    <ion-list-header>
      <ion-label color="medium">Información de la Cuenta</ion-label>
    </ion-list-header>

    <ion-item>
      <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Correo Electrónico</h3>
        <p>{{ usuario.email || '...' }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="card-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>CURP</h3>
        <p style="text-transform: uppercase;">{{ usuario.curp || '...' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div class="ion-padding" style="margin-top: 20px;">
    <ion-button expand="block" color="danger" fill="outline" (click)="confirmarCerrarSesion()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Cerrar Sesión
    </ion-button>
  </div>

</ion-content>
