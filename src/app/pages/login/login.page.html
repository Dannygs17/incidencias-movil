<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title style="font-weight: 800;">Acceso Ciudadano</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <div class="ion-text-center ion-margin-top ion-margin-bottom">
    <ion-icon name="person-circle-outline" style="font-size: 80px; color: var(--ion-color-primary);"></ion-icon>
    <h2 style="font-weight: 800;">Incidencias Smart</h2>
    <p style="color: var(--ion-color-medium);">Ingresa tus datos para continuar</p>
  </div>

  <ion-list lines="full" class="ion-margin-bottom" style="background: transparent;">
    <ion-item>
      <ion-label position="floating" color="medium">Correo Electrónico</ion-label>
      <ion-input type="email" [(ngModel)]="credentials.email" name="email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating" color="medium">Contraseña</ion-label>
      <ion-input type="password" [(ngModel)]="credentials.password" name="password"></ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding-horizontal">
    
    <ion-button expand="block" shape="round" color="primary" (click)="onLogin()" style="height: 50px; font-weight: 800; margin-top: 20px;">
      Iniciar Sesión
    </ion-button>
    
    <div style="display: flex; align-items: center; text-align: center; margin: 30px 0;">
      <div style="flex: 1; height: 1px; background: var(--ion-color-medium); opacity: 0.5;"></div>
      <span style="color: var(--ion-color-medium); margin: 0 15px; font-size: 12px; font-weight: 700; text-transform: uppercase;">O</span>
      <div style="flex: 1; height: 1px; background: var(--ion-color-medium); opacity: 0.5;"></div>
    </div>

    <ion-button expand="block" color="light" (click)="loginGoogle()" 
                style="font-weight: 700; height: 50px; --border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
      <ion-icon name="logo-google" slot="start" style="color: #EA4335; font-size: 22px;"></ion-icon>
      Continuar con Google
    </ion-button>
    
    <div class="ion-text-center" style="margin-top: 40px;">
      <p style="color: var(--ion-color-medium); font-size: 14px; margin-bottom: 5px;">¿Aún no tienes cuenta?</p>
      <ion-button fill="clear" (click)="irARegistro()" size="small" style="font-weight: 700; --color: var(--ion-color-primary);">
        Crea una cuenta nueva aquí
      </ion-button>
    </div>
    
  </div>
</ion-content>
